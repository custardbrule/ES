# Development Docker Compose
# Usage: docker-compose -f docker-compose.dev.yml --env-file configs/dev/.env up -d

services:
  # SQL Server for QuartzDB (UserDB/DiaryDB will be created by EF migrations)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: es-dev-mssql
    env_file:
      - ./configs/dev/.env
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - mssql-dev-data:/var/opt/mssql
      - ./Infrastructure/Data/quartzSchema.sql:/tmp/quartzSchema.sql
      - ./Infrastructure/Data/init-db.sh:/tmp/init-db.sh
    networks:
      - es-dev-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s
    entrypoint: bash -c '/opt/mssql/bin/sqlservr & bash /tmp/init-db.sh && wait'

  # Elasticsearch for search and snapshots
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.2
    container_name: es-dev-elasticsearch
    env_file:
      - ./configs/dev/.env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS}"
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - elasticsearch-dev-data:/usr/share/elasticsearch/data
    networks:
      - es-dev-network
    healthcheck:
      test: curl -u ${ELASTIC_USERNAME}:$${ELASTIC_PASSWORD} -f http://localhost:9200/_cluster/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Kafka for event streaming (KRaft mode - no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: es-dev-kafka
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
      - "${KAFKA_INTERNAL_PORT}:${KAFKA_INTERNAL_PORT}"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://0.0.0.0:${KAFKA_PORT},CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    networks:
      - es-dev-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:${KAFKA_PORT} || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # EventStoreDB (KurrentDB) for Event Sourcing
  eventstoredb:
    image: eventstore/eventstore:latest
    container_name: es-dev-eventstoredb
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_HTTP_PORT=${EVENTSTOREDB_PORT}
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
    ports:
      - "${EVENTSTOREDB_PORT}:${EVENTSTOREDB_PORT}"
    volumes:
      - eventstoredb-dev-data:/var/lib/eventstore
    networks:
      - es-dev-network
    healthcheck:
      test: curl -f http://localhost:${EVENTSTOREDB_PORT}/health/live || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # User API (SSO / Identity Provider)
  user-api:
    build:
      context: .
      dockerfile: API/User.Api/Dockerfile
    container_name: es-dev-user-api
    env_file:
      - ./configs/dev/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:${USER_API_PORT}
      - ConnectionStrings__UserConnection=Server=mssql;Database=${USER_DB};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__QuartzConnection=Server=mssql;Database=${QUARTZ_DB};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Elasticsearch__ConnectionString=http://elasticsearch:9200
      - Elasticsearch__Username=${ELASTIC_USERNAME}
      - Elasticsearch__Password=${ELASTIC_PASSWORD}
      - KafkaSettings__ProducerSettings__BootstrapServers=kafka:${KAFKA_INTERNAL_PORT}
      - KafkaSettings__ConsumerSettings__BootstrapServers=kafka:${KAFKA_INTERNAL_PORT}
      - KurrentDB=esdb://eventstoredb:${EVENTSTOREDB_PORT}?tls=false
    ports:
      - "${USER_API_PORT}:${USER_API_PORT}"
    depends_on:
      mssql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eventstoredb:
        condition: service_healthy
    networks:
      - es-dev-network
    restart: unless-stopped

  # Diary API
  diary-api:
    build:
      context: .
      dockerfile: API/Diary.Api/Dockerfile
    container_name: es-dev-diary-api
    env_file:
      - ./configs/dev/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:${DIARY_API_PORT}
      - Elasticsearch__ConnectionString=http://elasticsearch:9200
      - Elasticsearch__Username=${ELASTIC_USERNAME}
      - Elasticsearch__Password=${ELASTIC_PASSWORD}
      - KurrentDB=esdb://eventstoredb:${EVENTSTOREDB_PORT}?tls=false
      - KafkaSettings__ProducerSettings__BootstrapServers=kafka:${KAFKA_INTERNAL_PORT}
      - KafkaSettings__ConsumerSettings__BootstrapServers=kafka:${KAFKA_INTERNAL_PORT}
      - ConnectionStrings__QuartzConnection=Server=mssql;Database=${QUARTZ_DB};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Authentication__Authority=http://user-api:${USER_API_PORT}
      - Authentication__ValidIssuer=http://localhost:${USER_API_PORT}
    ports:
      - "${DIARY_API_PORT}:${DIARY_API_PORT}"
    depends_on:
      mssql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eventstoredb:
        condition: service_healthy
      user-api:
        condition: service_started
    networks:
      - es-dev-network
    restart: unless-stopped

networks:
  es-dev-network:
    driver: bridge

volumes:
  mssql-dev-data:
  elasticsearch-dev-data:
  eventstoredb-dev-data:
